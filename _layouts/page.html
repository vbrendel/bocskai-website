---
layout: default
---

<section class="page-hero">
  <div class="container">
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="{{ '/' | relative_url }}">Home</a>
      <span class="breadcrumb-sep" aria-hidden="true">›</span>
      <span>{{ page.title }}</span>
    </nav>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p>{{ page.subtitle }}</p>{% endif %}
  </div>
</section>

{{ content }}
